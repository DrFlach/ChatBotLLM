<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatbot LLM + RAG</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="Chatbot programu studiow">
        <header class="header">
          <div>
            <p class="eyebrow">University RAG Assistant</p>
            <h1>Chatbot programu studiow</h1>
          </div>
          <span class="status">FAISS + LLM</span>
        </header>

        <div id="messages" class="messages">
          <article class="message assistant">
            <p>Zapytaj o przedmioty, sylabusy, egzaminy, konsultacje lub zasady zaliczenia. You can also ask in English.</p>
          </article>
        </div>

        <form id="chat-form" class="composer">
          <textarea
            id="question"
            name="question"
            rows="3"
            placeholder="Np. Jakie przedmioty sa na Informatyce w semestrze 2?"
            required
          ></textarea>
          <button type="submit">Wyslij</button>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
